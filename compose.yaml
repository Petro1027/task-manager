services:
  postgres:
    image: postgres:16
    container_name: task-manager-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: task_manager
      POSTGRES_USER: task_manager_user
      POSTGRES_PASSWORD: task_manager_password
    ports:
      - "5432:5432"
    volumes:
      - task_manager_postgres_data:/var/lib/postgresql/data

volumes:
  task_manager_postgres_data:
